<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <meta http-equiv="Content-Security-Policy" content="script-src 'self';">
        <link rel="stylesheet" href="css/style.css">
        <title>plebisite</title>
        <link rel="manifest" href="manifest.json">
        <link rel="icon" type="image/x-icon" href="/images/icon.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>

    <header>
        <div class="logo">
            <a href="index.html"><img src="images/logo.png" alt="plebisite logo"></a>
        </div>

        <div class="new_cam">
            <button class="create_campaign">Create a campaign</button>
        </div>
    </header>

    <body>
        <main>
            
            <div class="form">
                
                <div class="name_input">
                    <p>Name of campaign:</p>
                    <input id="campaign_name" type="text">
                </div>

                <div class="candidate_input">
                    <p>Enter the name of each candidate: </p>
                    <p>This can be the first name, full name, nickname, whatever is most necessary!</p>
                    <input type="text">
                    <input type="image" id="add_candidate" src="images/plus.png">
                </div>

                <div class="email_input">
                    <p>Upload emails of voters:</p>
                    <input type="file" id="email_doc" accept=".docx, .txt, .pdf, .xlx, .xlsx">
                </div>

                <div class="event_end_input">
                    <p>When does this campaign end?</p>
                    <input type="datetime-local" id="end_date">
                </div>

                <div class="votesys_input">
                    <p>Select a voting system:</p>
                    <p>Preferential voting is highly recommended</p>
                    <input type="radio" id="pref_vote">
                    <label for="pref_vote">Preferential</label>
                    <input type="radio" id="majority_vote">
                    <label for="majority_vote">Majority</label>
                </div>
                <button class="button" id="create_campaign_submit">Create</button>
            </div>
        </main>
        <script src="js/app.js"></script>
    </body>

    <footer>
        <p>Need help? Click <a href="help.html">here</a>.</p>
    </footer>

</html>
