<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta http-equiv="X-UA-Compatible" content="ie=edge">
      <meta http-equiv="Content-Security-Policy" content="script-src 'self';">
      <link rel="stylesheet" href="css/style.css">
      <title>plebisite</title>
      <link rel="manifest" href="manifest.json">
      <link rel="icon" type="image/x-icon" href="/images/icon.png">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
   </head>

   <header>
      <div class="logo">
         <a href="index.html"><img src="images/logo.png" alt="plebisite logo"></a>
      </div>

      <div class="new_cam">
         <button id="create_campaign" class="button">Create a campaign</button>
      </div>
   </header>

   <body>
      <main>
         <div id="interaction_field">
            <h2 class="welcome_text" id="center_title">Here to vote?</h2>
            <input id="code_field" type="text" placeholder="Enter your unique key here...">
            <button class="button" id="code_enter">Proceed</button>
         </div>  
      </main>
      <script src="js/app.js"></script>
   </body>

   <footer>
      <p id="footer_text">Need help? Click <a href="help.html">here</a></p>
   </footer>

</html>
