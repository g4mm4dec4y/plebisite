<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <meta http-equiv="Content-Security-Policy" content="script-src 'self';">
        <link rel="stylesheet" href="css/style.css">
        <title>buzz of the 00s</title>
        <link rel="manifest" href="manifest.json">
        <link rel="icon" type="image/x-icon" href="/images/icon.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+SemiExpanded:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    </head>

    <header>
        <div class="logo">
            <a href="index.html"><img src="images/logo.png" alt="plebisite logo"></a>
        </div>

        <div class="new_cam">
            <button id="create_campaign" class="button">Create a campaign</button>

        </div>
    </header>

    <body>

        <div id="info_popup" class="box">
            <h1>What do I do?</h1>
            <p>Label each candidate in order of preference, where 1 is the most preferred candidate.</p>
            <p>Then, click 'Submit'.</p>
            <p>Remember, the order in which you select candidates could matter!</p>
            <button id="info_read">Got it!</button>
        </div>

        <main>
            <div class="box" id="vote_form">
                <div id="heading">
                    <h1>You are voting for:</h1>
                    <h1 id="event_name"></h1>
                </div>
                
                <div class="candidate">
                    <h2 id="candidate_name"></h2>
                    <input id="candidate_num" type="number">
                </div>

                <button id="vote_submit" class="button">Submit</button>
                
            </div>
        </main>
        <script src="js/app.js"></script>
    </body>

    <footer>
        <p>Need help? Click <a href="help.html">here</a>.</p>
    </footer>

</html>
